[build]
buildCommand = "npx prisma generate --schema packages/db/prisma/schema.prisma && npx prisma db push --schema packages/db/prisma/schema.prisma --accept-data-loss && npm run build -w packages/shared && npm run build -w packages/db && npm run build -w packages/telegram && npm run build -w apps/backend"

[deploy]
startCommand = "node apps/backend/dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
